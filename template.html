            render();

            // console hook for debugging the folder browser
            window.folderBrowser = { tree, kids, selected, selectedFiles, expanded,
                                     highlightOverlay, refreshHighlights, showHeader,
                                     revealFoldersAt };
            window.skyDebug = {
                get nearbyCatalogName() { return nearbyCatalogName; },
                get ninaTargetJSON() { return ninaTargetJSON; },
                get loadCatalogData() { return loadCatalogData; },
                get catColors() { return catColors; },
            };

            // ================= menu + panels =================
            const PANELS = {
                controls: { el: document.getElementById('controls'), show: 'block' },
                folders:  { el: document.getElementById('folders'),  show: 'flex' },
                stats:    { el: document.getElementById('stats'),     show: 'flex' },
                catalog:  { el: document.getElementById('catalog'),   show: 'flex' },
                plan:     { el: document.getElementById('plan'),      show: 'flex' },
                framing:  { el: document.getElementById('framing'),   show: 'flex' },
            };
            const openPanels = new Set(['controls']);
            let planMode = false;
            const panelPos = {};

            function applyPanels() {
                for (const [name, p] of Object.entries(PANELS)) {
                    p.el.style.display = openPanels.has(name) ? p.show : 'none';
                    const btn = document.querySelector('.menu-btn[data-panel="' + name + '"]');
                    if (btn) btn.classList.toggle('active', openPanels.has(name));
                }
            }
            const DEFAULT_POS = {
                stats:   () => [Math.max(360, window.innerWidth - 340), 46],
                catalog: () => [Math.max(360, window.innerWidth - 340), 46],
                plan:    () => [Math.round(window.innerWidth / 2 - 160), 80],
                framing: () => [Math.max(360, window.innerWidth - 310), 46],
            };
            function placeGeneric(name) {
                const el = PANELS[name].el;
                const p = panelPos[name] || (DEFAULT_POS[name] ? DEFAULT_POS[name]() : [380, 60]);
                el.style.left = Math.max(0, Math.min(p[0], window.innerWidth - 80)) + 'px';
                el.style.top = Math.max(38, Math.min(p[1], window.innerHeight - 40)) + 'px';
            }
            function openPanel(name, on) {
                if (on === undefined) on = !openPanels.has(name);
                if (on) { openPanels.add(name); placeGeneric(name); } else openPanels.delete(name);
                if (on && name === 'stats') renderStats();
                if (on && name === 'catalog') ensureCatalog();
                applyPanels(); saveState();
            }
            document.querySelectorAll('.menu-btn[data-panel]').forEach(btn =>
                btn.addEventListener('click', () => openPanel(btn.dataset.panel)));
            document.querySelectorAll('.panel-x[data-panel]').forEach(btn =>
                btn.addEventListener('click', () => openPanel(btn.dataset.panel, false)));

            // generic drag for the stats/catalog/plan panels
            document.querySelectorAll('.panel-head[data-drag]').forEach(head => {
                const name = head.dataset.drag, el = PANELS[name].el;
                let dg = null;
                head.addEventListener('pointerdown', (e) => {
                    if (e.target.classList.contains('panel-x')) return;
                    dg = { x0: e.clientX, y0: e.clientY, left: el.offsetLeft, top: el.offsetTop };
                    try { head.setPointerCapture(e.pointerId); } catch (err) {}
                    e.preventDefault();
                });
                head.addEventListener('pointermove', (e) => {
                    if (!dg) return;
                    el.style.left = Math.max(0, dg.left + e.clientX - dg.x0) + 'px';
                    el.style.top = Math.max(38, dg.top + e.clientY - dg.y0) + 'px';
                });
                head.addEventListener('pointerup', () => {
                    if (!dg) return;
                    panelPos[name] = [el.offsetLeft, el.offsetTop];
                    dg = null; saveState();
                });
            });

            const planBtn = document.getElementById('plan-mode-btn');
            planBtn.addEventListener('click', () => {
                planMode = !planMode;
                planBtn.classList.toggle('active', planMode);
                toastMsg(planMode ? 'Plan mode ON — click anywhere on the sky' : 'Plan mode off');
                saveState();
            });
            document.getElementById('poster-btn').addEventListener('click', exportPoster);

            // ================= statistics =================
            function renderStats() {
                const S = STATS, h = (s) => fmtExposure(s);
                const filterRows = Object.entries(S.by_filter).map(([f, s]) =>
                    '<tr><td>' + esc(f) + '</td><td class="r">' + h(s) + '</td></tr>').join('');
                const rigRows = Object.entries(S.by_rig).map(([r, s]) =>
                    '<tr><td>' + esc(r) + '</td><td class="r">' + h(s) + '</td></tr>').join('');
                const months = Object.entries(S.by_month);
                const mMax = Math.max(1, ...months.map(m => m[1]));
                const monthRows = months.map(([m, s]) =>
                    '<tr><td>' + m + '</td><td><div class="barwrap"><span class="bar" style="width:' +
                    Math.round(s / mMax * 120) + 'px"></span><span style="color:#9bd">' + h(s) + '</span></div></td></tr>').join('');
                const topRows = S.top_targets.map(t =>
                    '<tr><td>' + esc(t.name) + '</td><td class="r">' + h(t.seconds) + ' · ' + t.frames + 'f</td></tr>').join('');
                const cond = S.cond_count
                    ? '<div class="stat-sec">Capture conditions (median)</div><table class="kv">' +
                      (S.median_alt != null ? '<tr><td>Altitude</td><td class="r">' + S.median_alt + '°</td></tr>' : '') +
                      (S.median_airmass != null ? '<tr><td>Airmass</td><td class="r">' + S.median_airmass + '</td></tr>' : '') +
                      (S.median_foctemp != null ? '<tr><td>Focuser temp</td><td class="r">' + S.median_foctemp + '°C</td></tr>' : '') +
                      '</table>' : '';
                document.getElementById('stats-body').innerHTML =
                    '<div class="stat-big">' +
                    '<div><div class="num">' + h(S.total_seconds) + '</div><div class="lbl">Integration</div></div>' +
                    '<div><div class="num">' + S.total_frames.toLocaleString() + '</div><div class="lbl">Light frames</div></div>' +
                    '<div><div class="num">' + S.targets + '</div><div class="lbl">Targets</div></div>' +
                    '<div><div class="num">' + S.nights + '</div><div class="lbl">Nights</div></div>' +
                    '</div>' +
                    '<div class="muted">' + (S.date_min || '?') + ' → ' + (S.date_max || '?') + '</div>' +
                    '<div class="stat-sec">Integration by filter</div><table class="kv">' + filterRows + '</table>' +
                    '<div class="stat-sec">By rig</div><table class="kv">' + rigRows + '</table>' +
                    '<div class="stat-sec">By month</div><table class="kv">' + monthRows + '</table>' +
                    '<div class="stat-sec">Most-imaged targets</div><table class="kv">' + topRows + '</table>' +
                    cond;
            }

            // ================= Messier / Caldwell / GI750 catalog =================
            let catalogData = null;
            const CAT_LABEL = { M: 'Messier', C: 'Caldwell', G: 'GI750' };
            const CAT_DEFAULT_COLOR = { M: '#55ddff', C: '#ffaa44', G: '#cc88ff' };
            const catColors = Object.assign({}, CAT_DEFAULT_COLOR);
            const catShow = { M: true, C: true, G: false };   // GI750 off by default (750 markers)
            const catTodo = { M: false, C: false, G: false };  // "only to-do" filter, per catalog
            let catTab = 'M';
            let catScoreMin = 1;                               // GI750 only: show objects with score >= this (1 = all)
            const catLayers = {};                              // cat -> A.catalog
            const catByCat = { M: [], C: [], G: [] };

            function clusterCoversPoint(ra, dec) {
                for (const c of DATA.clusters) {
                    const r = c.rect;
                    if (dec < r[2] || dec > r[3]) continue;
                    if (pointInQuad(ra, dec, c.corners)) return true;
                }
                return false;
            }
            async function loadCatalogData() {
                if (catalogData) return catalogData;
                if (!SETTINGS.catalogPresent) return null;
                const r = await fetch(SETTINGS.catalogFile);
                catalogData = await r.json();
                for (const o of catalogData) {
                    o.done = clusterCoversPoint(o.ra, o.dec);
                    (catByCat[o.cat] = catByCat[o.cat] || []).push(o);
                }
                return catalogData;
            }
            function nearbyCatalogName(ra, dec) {
                if (!catalogData) return null;
                const cd = Math.cos(dec * Math.PI / 180);
                const rank = { M: 0, C: 1, G: 2 };            // prefer Messier > Caldwell > GI750 name
                let best = null, bestKey = [9, 0.1];          // [rank, distance]; 0.1° ≈ "clicked on it"
                for (const o of catalogData) {
                    const dd = dec - o.dec;
                    const dx = (((ra - o.ra + 540) % 360) - 180) * cd;
                    const d = Math.sqrt(dd * dd + dx * dx);
                    if (d > 0.1) continue;
                    const key = [rank[o.cat] ?? 3, d];
                    if (key[0] < bestKey[0] || (key[0] === bestKey[0] && key[1] < bestKey[1])) {
                        bestKey = key; best = o;
                    }
                }
                return best ? (best.desig || best.id) : null;
            }
            // GI750 markers are drawn by score so the best targets stand out: higher
            // scores are brighter (more opaque) and slightly larger. Everything is
            // derived from the root color (catColors.G), so the color picker still
            // works; score 1 keeps a visible floor opacity.
            function giScoreStyle(score) {
                const s = Math.max(1, Math.min(5, score || 1));
                return {
                    alpha: 0.4 + (s - 1) / 4 * 0.6,   // 0.40 (score 1) … 1.0 (score 5)
                    radius: 4 + (s - 1) * 1.1,        // 4px … 8.4px
                    font: Math.round(9 + (s - 1) * 0.9) + 'px sans-serif'   // 9px … 13px
                };
            }
            function giDrawSource(source, ctx) {
                if (source.x === undefined) return;   // off-screen sources have no canvas pos
                const st = giScoreStyle(source.data && source.data.score);
                ctx.save();
                ctx.globalAlpha = st.alpha;
                ctx.strokeStyle = catColors.G;
                ctx.fillStyle = catColors.G;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(source.x, source.y, st.radius, 0, 2 * Math.PI);
                ctx.stroke();
                // Labels only when zoomed in enough (matches the footprint label rule),
                // otherwise 750 names overlap into noise at wide fields.
                let fovWide = false;
                try { fovWide = aladin.getFov()[0] > SETTINGS.labelHideFov; } catch (e) {}
                if (!fovWide && source.data && source.data.name) {
                    ctx.font = st.font;
                    ctx.fillText(source.data.name, source.x + st.radius + 3, source.y + 4);
                }
                ctx.restore();
            }
            function makeCatLayer(cat) {
                const opts = {
                    name: 'cat-' + cat, sourceSize: 9, color: catColors[cat],
                    labelColumn: 'name', labelColor: catColors[cat], labelFont: '10px sans-serif'
                };
                if (cat === 'G') {                    // per-source draw handles markers + labels
                    opts.shape = giDrawSource; opts.displayLabel = false;
                } else {
                    opts.shape = 'circle'; opts.displayLabel = true;
                }
                const layer = A.catalog(opts);
                aladin.addCatalog(layer);
                return layer;
            }
            function populateCatLayer(cat) {
                const layer = catLayers[cat];
                if (!layer) return;
                layer.removeAll();
                const src = [];
                for (const o of (catByCat[cat] || [])) {
                    if (catTodo[cat] && o.done) continue;
                    if (cat === 'G' && (o.score || 0) < catScoreMin) continue;
                    // GI750 uses the real object name as its label; M/C keep their
                    // recognizable catalog ids (M1, C11) rather than the resolved desig.
                    src.push(cat === 'G'
                        ? A.source(o.ra, o.dec, { name: o.desig || o.id, score: o.score })
                        : A.source(o.ra, o.dec, { name: o.id }));
                }
                if (src.length) layer.addSources(src);
            }
            function ensureCatLayer(cat) {                     // (re)build in current color
                if (catLayers[cat]) {
                    try { aladin.removeOverlay(catLayers[cat]); }
                    catch (e) { try { catLayers[cat].hide(); } catch (e2) {} }
                }
                catLayers[cat] = makeCatLayer(cat);
                populateCatLayer(cat);
            }
            function applyCatVis() {
                for (const cat of ['M', 'C', 'G']) {
                    if (catShow[cat]) {
                        if (!catLayers[cat]) ensureCatLayer(cat);
                        try { catLayers[cat].show(); } catch (e) {}
                    } else if (catLayers[cat]) {
                        try { catLayers[cat].hide(); } catch (e) {}
                    }
                }
            }
            async function ensureCatalog() {
                const body = document.getElementById('catalog-body');
                if (!SETTINGS.catalogPresent) { body.textContent = 'Catalog file missing — run generate_catalog.py.'; return; }
                if (!catalogData) {
                    body.textContent = 'Loading catalog…';
                    try { await loadCatalogData(); } catch (e) { body.textContent = 'Could not load catalog.'; return; }
                }
                renderCatalogPanel();
                applyCatVis();
            }
            function catVisible(o) {                           // passes the per-tab filters (to-do, score)
                if (catTodo[o.cat] && o.done) return false;
                if (o.cat === 'G' && (o.score || 0) < catScoreMin) return false;
                return true;
            }
            function renderCatalogPanel() {
                const tabs = ['M', 'C', 'G'].map(cat =>
                    '<button class="cat-tab' + (cat === catTab ? ' active' : '') + '" data-cat="' + cat + '">' +
                    CAT_LABEL[cat] + '</button>').join('');
                const objs = catByCat[catTab] || [];
                const shown = objs.filter(catVisible);
                const done = shown.filter(o => o.done).length;
                const scoreCtrl = catTab === 'G' ?
                    '<label class="checkbox-container" title="Show only objects scored at least this (1 = all, 5 = best only)">Min score ' +
                    '<select id="cat-score">' + [1, 2, 3, 4, 5].map(v =>
                        '<option value="' + v + '"' + (v === catScoreMin ? ' selected' : '') + '>' + v + '+</option>').join('') +
                    '</select></label>' : '';
                document.getElementById('catalog-body').innerHTML =
                    '<div class="cat-tabs">' + tabs + '</div>' +
                    '<div class="cat-ctrls">' +
                    '<input type="color" id="cat-color" value="' + catColors[catTab] + '" title="Marker & label color">' +
                    '<label class="checkbox-container"><input type="checkbox" id="cat-show"' + (catShow[catTab] ? ' checked' : '') + '> Show on map</label>' +
                    '<label class="checkbox-container"><input type="checkbox" id="cat-todo"' + (catTodo[catTab] ? ' checked' : '') + '> Only to-do</label>' +
                    scoreCtrl +
                    '</div>' +
                    '<div class="cat-prog">' + CAT_LABEL[catTab] + ' <span class="pct">' + done + '/' + shown.length + '</span> imaged</div>' +
                    '<div id="catalog-list"></div>';
                document.querySelectorAll('.cat-tab').forEach(b => b.addEventListener('click', () => {
                    catTab = b.dataset.cat; renderCatalogPanel(); saveState();
                }));
                const scoreSel = document.getElementById('cat-score');
                if (scoreSel) scoreSel.addEventListener('change', e => {
                    catScoreMin = parseInt(e.target.value, 10) || 1;
                    if (catLayers.G) populateCatLayer('G');
                    renderCatalogPanel(); saveState();
                });
                document.getElementById('cat-color').addEventListener('change', e => {
                    catColors[catTab] = e.target.value;
                    if (catShow[catTab]) ensureCatLayer(catTab);   // recreate in the new color
                    saveState();
                });
                document.getElementById('cat-show').addEventListener('change', e => {
                    catShow[catTab] = e.target.checked; applyCatVis(); saveState();
                });
                document.getElementById('cat-todo').addEventListener('change', e => {
                    catTodo[catTab] = e.target.checked;
                    if (catLayers[catTab]) populateCatLayer(catTab);
                    renderCatalogList(); saveState();
                });
                renderCatalogList();
            }
            function renderCatalogList() {
                const objs = (catByCat[catTab] || []).filter(catVisible);
                const list = document.getElementById('catalog-list');
                const frag = document.createDocumentFragment();
                let n = 0;
                for (const o of objs) {
                    if (++n > 1500) {                          // cap rows so a long list stays responsive
                        const more = document.createElement('div');
                        more.className = 'muted'; more.style.padding = '4px 2px';
                        more.textContent = '…' + (objs.length - 1500) + ' more — narrow with “Only to-do”' +
                            (catTab === 'G' ? ' or a higher min score.' : '.');
                        frag.appendChild(more); break;
                    }
                    const row = document.createElement('div');
                    row.className = 'cat-row ' + (o.done ? 'done' : 'todo');
                    const score = (o.cat === 'G' && o.score) ?
                        ' <span style="color:#cc88ff" title="Quality score 1–5">★' + o.score + '</span>' : '';
                    row.innerHTML = '<span class="ck">' + (o.done ? '✓' : '○') + '</span>' +
                        '<span>' + esc(o.desig || o.id) + score + (o.common ? ' · ' + esc(o.common) : '') +
                        ' <span style="color:#777">(' + esc(o.otype) + ')</span></span>';
                    row.addEventListener('click', () => { aladin.gotoRaDec(o.ra, o.dec); aladin.setFov(2.5); });
                    frag.appendChild(row);
                }
                list.innerHTML = '';
                list.appendChild(frag);
            }

            // ================= altitude curve (shared by plan + details) =================
            function altitudeCurve(canvas, ra, dec) {
                if (SETTINGS.lat === null) return null;
                const ctx = canvas.getContext('2d');
                const W = canvas.width, H = canvas.height;
                ctx.clearRect(0, 0, W, H);
                const start = new Date(); start.setHours(16, 0, 0, 0);
                const span = 18 * 3600 * 1000, N = 96;
                const X = i => 4 + i * (W - 8) / N;
                const Y = a => H - 14 - (Math.max(-10, Math.min(90, a)) + 10) / 100 * (H - 18);
                let maxAlt = -90, maxI = 0; const alts = [], dark = [];
                for (let i = 0; i <= N; i++) {
                    const jd = julianDate(new Date(start.getTime() + i * span / N));
                    const a = altDeg(ra, dec, jd); alts.push(a);
                    const s = sunRaDec(jd); dark.push(altDeg(s.ra, s.dec, jd) < -18);
                    if (a > maxAlt) { maxAlt = a; maxI = i; }
                }
                ctx.fillStyle = 'rgba(60,90,150,0.30)';
                for (let i = 0; i < N; i++) if (dark[i]) ctx.fillRect(X(i), 0, (W - 8) / N + 1, H - 12);
                ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.moveTo(4, Y(0)); ctx.lineTo(W - 4, Y(0)); ctx.stroke();
                ctx.strokeStyle = '#664'; ctx.setLineDash([3, 3]); ctx.beginPath();
                ctx.moveTo(4, Y(SETTINGS.minAlt)); ctx.lineTo(W - 4, Y(SETTINGS.minAlt)); ctx.stroke(); ctx.setLineDash([]);
                ctx.strokeStyle = '#6cf'; ctx.lineWidth = 2; ctx.beginPath();
                alts.forEach((a, i) => { const px = X(i), py = Y(a); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }); ctx.stroke();
                ctx.fillStyle = '#fd6'; ctx.beginPath(); ctx.arc(X(maxI), Y(maxAlt), 3, 0, 7); ctx.fill();
                ctx.fillStyle = '#888'; ctx.font = '9px sans-serif';
                ctx.fillText('90°', 2, 9); ctx.fillText(SETTINGS.minAlt + '°', 2, Y(SETTINGS.minAlt) - 2);
                [['18h', 2 / 18], ['00h', 8 / 18], ['06h', 14 / 18]].forEach(([t, f]) =>
                    ctx.fillText(t, X(N * f) - 6, H - 2));
                return { maxAlt: Math.round(maxAlt), maxTime: new Date(start.getTime() + maxI * span / N) };
            }
            const hhmm = d => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

            // ================= target file export =================
            function downloadText(filename, text, mime) {
                const blob = new Blob([text], { type: mime || 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = filename; a.click();
                URL.revokeObjectURL(a.href);
            }
            function raParts(raDeg) {
                let t = ((raDeg % 360) + 360) % 360 / 15, h = Math.floor(t);
                let mf = (t - h) * 60, m = Math.floor(mf), s = Math.round((mf - m) * 60 * 100) / 100;
                if (s >= 60) { s -= 60; m++; } if (m >= 60) { m -= 60; h++; } h %= 24;
                return [h, m, s];
            }
            function decParts(decDeg) {
                const neg = decDeg < 0; let a = Math.abs(decDeg), d = Math.floor(a);
                let mf = (a - d) * 60, m = Math.floor(mf), s = Math.round((mf - m) * 60 * 100) / 100;
                if (s >= 60) { s -= 60; m++; } if (m >= 60) { m -= 60; d++; }
                return [neg, d, m, s];
            }
            // NINA Advanced Sequencer target (.json) — same schema as a target exported
            // from NINA, so it imports directly into the sequencer.
            function ninaTargetJSON(name, ra, dec) {
                const [rh, rm, rs] = raParts(ra), [neg, dd, dm, ds] = decParts(dec);
                const obj = {
                    "$id": "1", "$type": "NINA.Sequencer.Container.DeepSkyObjectContainer, NINA.Sequencer",
                    "Target": {
                        "$id": "2", "$type": "NINA.Astrometry.InputTarget, NINA.Astrometry",
                        "Expanded": true, "TargetName": name, "PositionAngle": 0.0,
                        "InputCoordinates": {
                            "$id": "3", "$type": "NINA.Astrometry.InputCoordinates, NINA.Astrometry",
                            "RAHours": rh, "RAMinutes": rm, "RASeconds": rs,
                            "NegativeDec": neg, "DecDegrees": dd, "DecMinutes": dm, "DecSeconds": ds
                        }
                    },
                    "ExposureInfoListExpanded": false,
                    "ExposureInfoList": { "$id": "4", "$type": "NINA.Core.Utility.AsyncObservableCollection`1[[NINA.Sequencer.Utility.ExposureInfo, NINA.Sequencer]], NINA.Core", "$values": [] },
                    "Strategy": { "$type": "NINA.Sequencer.Container.ExecutionStrategy.SequentialStrategy, NINA.Sequencer" },
                    "Name": name,
                    "Conditions": { "$id": "5", "$type": "System.Collections.ObjectModel.ObservableCollection`1[[NINA.Sequencer.Conditions.ISequenceCondition, NINA.Sequencer]], System.ObjectModel", "$values": [] },
                    "IsExpanded": true,
                    "Items": {
                        "$id": "6", "$type": "System.Collections.ObjectModel.ObservableCollection`1[[NINA.Sequencer.SequenceItem.ISequenceItem, NINA.Sequencer]], System.ObjectModel",
                        "$values": [{
                            "$id": "7", "$type": "NINA.Sequencer.SequenceItem.Imaging.TakeExposure, NINA.Sequencer",
                            "ExposureTime": 60.0, "Gain": -1, "Offset": -1,
                            "Binning": { "$id": "8", "$type": "NINA.Core.Model.Equipment.BinningMode, NINA.Core", "X": 1, "Y": 1 },
                            "ImageType": "LIGHT", "ExposureCount": 0, "Parent": { "$ref": "1" }, "ErrorBehavior": 0, "Attempts": 1
                        }]
                    },
                    "Triggers": { "$id": "9", "$type": "System.Collections.ObjectModel.ObservableCollection`1[[NINA.Sequencer.Trigger.ISequenceTrigger, NINA.Sequencer]], System.ObjectModel", "$values": [] },
                    "Parent": null, "ErrorBehavior": 0, "Attempts": 1
                };
                return JSON.stringify(obj, null, 2);
            }
            async function saveNinaTarget(ra, dec) {
                // Use a known catalog object's name if the point is on one; otherwise ask.
                try { await loadCatalogData(); } catch (e) {}
                let name = nearbyCatalogName(ra, dec);
                if (!name) {
                    name = prompt('Object name for the NINA target:', '');
                    if (name === null) return;            // cancelled
                    name = name.trim() || 'Sky point';
                }
                const fname = name.replace(/[\\/:*?"<>|]/g, '').trim() + '.json';
                downloadText(fname, ninaTargetJSON(name, ra, dec), 'application/json');
                toastMsg('Saved NINA target: ' + name);
            }

            // ================= plan popup (click empty sky in plan mode) =================
            function openPlanPopup(ra, dec) {
                openPanels.add('plan'); placeGeneric('plan'); applyPanels();
                const body = document.getElementById('plan-body');
                const safe = (raToHms(ra) + ' ' + decToDms(dec));
                body.innerHTML =
                    '<div class="muted">' + esc(safe) + '</div>' +
                    '<div class="muted">' + ra.toFixed(5) + ', ' + dec.toFixed(5) + '</div>' +
                    '<canvas id="plan-alt"></canvas>' +
                    '<div id="plan-alt-info" class="muted"></div>' +
                    '<div id="plan-where" class="muted">…</div>' +
                    '<button class="search-btn" id="plan-copy" style="width:100%;margin-top:8px;">Copy coordinates</button>' +
                    '<button class="search-btn" id="plan-nina" style="width:100%;margin-top:6px;">Save NINA target (.json)</button>';
                const cv = document.getElementById('plan-alt');
                cv.width = cv.clientWidth || 296; cv.height = 120;
                const r = altitudeCurve(cv, ra, dec);
                document.getElementById('plan-alt-info').innerText = r
                    ? 'Tonight: max altitude ' + r.maxAlt + '° at ' + hhmm(r.maxTime)
                    : 'Set OBSERVER_LAT/LON for altitude.';
                document.getElementById('plan-copy').addEventListener('click', () => {
                    navigator.clipboard.writeText(ra.toFixed(6) + ', ' + dec.toFixed(6))
                        .then(() => toastMsg('Copied coordinates')).catch(() => {});
                });
                document.getElementById('plan-nina').addEventListener('click', () => saveNinaTarget(ra, dec));
                fetch('/api/objectinfo?ra=' + ra + '&dec=' + dec).then(r => r.json()).then(info => {
                    const w = document.getElementById('plan-where');
                    if (!w) return;
                    let s = info.constellation ? 'Constellation: ' + esc(info.constellation) : '';
                    if (info.simbad_url) s += (s ? ' · ' : '') + '<a href="' + info.simbad_url +
                        '" target="_blank" rel="noopener" style="color:#6cf">SIMBAD here</a>';
                    if (info.ned_url) s += ' · <a href="' + info.ned_url +
                        '" target="_blank" rel="noopener" style="color:#6cf">NED here</a>';
                    w.innerHTML = s;
                }).catch(() => {});
            }

            // ================= poster export =================
            function exportPoster() {
                try {
                    const r = aladin.getViewDataURL ? aladin.getViewDataURL({ format: 'image/png' }) : null;
                    if (r) {
                        Promise.resolve(r).then(url => { downloadHref(url, 'sky_coverage.png'); toastMsg('Poster exported'); });
                        return;
                    }
                } catch (e) {}
                const cv = document.querySelector('#aladin-lite-div canvas');
                if (cv) { downloadHref(cv.toDataURL('image/png'), 'sky_coverage.png'); toastMsg('Poster exported'); }
                else toastMsg('Export not supported by this Aladin build');
            }
            function downloadHref(href, name) {
                const a = document.createElement('a'); a.href = href; a.download = name; a.click();
            }

            // ================= framing assist =================
            function updateFramingRect() {
                const rect = document.getElementById('framing-rect');
                if (!rect) return;
                const active = document.getElementById('fr-active').checked;
                if (!active) { rect.style.display = 'none'; return; }
                const fl  = parseFloat(document.getElementById('fr-focal').value);
                const sw  = parseFloat(document.getElementById('fr-sw').value);
                const sh  = parseFloat(document.getElementById('fr-sh').value);
                const rot = parseFloat(document.getElementById('fr-rot').value) || 0;
                const info = document.getElementById('fr-fov-info');
                if (!fl || !sw || !sh || fl <= 0 || sw <= 0 || sh <= 0) {
                    rect.style.display = 'none';
                    if (info) info.textContent = 'Enter focal length and sensor size.';
                    return;
                }
                const fovWDeg = 2 * Math.atan(sw / (2 * fl)) * R2D;
                const fovHDeg = 2 * Math.atan(sh / (2 * fl)) * R2D;
                let fov;
                try { fov = aladin.getFov(); } catch (e) { return; }
                // px/deg scale is uniform at the map centre; width axis gives the best reading.
                const scale = window.innerWidth / fov[0];
                rect.style.width  = (fovWDeg * scale) + 'px';
                rect.style.height = (fovHDeg * scale) + 'px';
                rect.style.borderColor = document.getElementById('fr-color').value;
                rect.style.transform = 'translate(-50%, -50%) rotate(' + rot + 'deg)';
                rect.style.display = 'block';
                if (info) info.textContent = fovWDeg.toFixed(2) + '° × ' + fovHDeg.toFixed(2) +
                    '°  (' + Math.round(fovWDeg * 60) + '′ × ' + Math.round(fovHDeg * 60) + '′)';
            }
            for (const id of ['fr-focal', 'fr-sw', 'fr-sh', 'fr-rot', 'fr-color', 'fr-active']) {
                document.getElementById(id).addEventListener('input', () => { updateFramingRect(); saveState(); });
            }

            // ---------- remember UI state between sessions ----------
            function saveState() {
                try {
                    localStorage.setItem(LS_KEY, JSON.stringify({
                        survey: els.survey.value,
                        grid: els.grid.checked,
                        constellations: els.constellations.checked,
                        mosaics: els.mosaics.checked,
                        tonight: els.tonight.checked,
                        flipH: els.flipH.checked,
                        flipV: els.flipV.checked,
                        rigs: rigEnabled,
                        collapsed: controlsBody.style.display === 'none',
                        panelX: controls.offsetLeft,
                        panelY: controls.offsetTop,
                        highlightColor: colorInput.value,
                        folderCollapsed: foldersBody.style.display === 'none',
                        folderPanelX: foldersPanel.offsetLeft,
                        folderPanelY: foldersPanel.offsetTop,
                        openPanels: Array.from(openPanels).filter(n => n !== 'plan'),
                        planMode: planMode,
                        panelPos: panelPos,
                        catColors: catColors,
                        catShow: catShow,
                        catTodo: catTodo,
                        catTab: catTab,
                        catScoreMin: catScoreMin,
                        framingFocal:  document.getElementById('fr-focal').value,
                        framingSwMm:   document.getElementById('fr-sw').value,
                        framingShMm:   document.getElementById('fr-sh').value,
                        framingRot:    document.getElementById('fr-rot').value,
                        framingColor:  document.getElementById('fr-color').value,
                        framingActive: document.getElementById('fr-active').checked
                    }));
                } catch (e) {}
            }
            function restoreState() {
                let s = null;
                try { s = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}
                if (!s) return;
                if (s.survey && [...els.survey.options].some(o => o.value === s.survey)) {
                    els.survey.value = s.survey;
                    aladin.setBaseImageLayer(aladin.createImageSurvey(s.survey));
                }
                for (const key of ['grid', 'constellations', 'mosaics', 'tonight', 'flipH', 'flipV']) {
                    if (typeof s[key] === 'boolean') els[key].checked = s[key];
                }
                if (els.flipH.checked || els.flipV.checked) applyFlips();
                if (s.rigs) {
                    for (const color in s.rigs) {
                        if (rigCheckboxes[color]) {
                            rigCheckboxes[color].checked = !!s.rigs[color];
                            rigEnabled[color] = !!s.rigs[color];
                        }
                    }
                }
                if (typeof s.panelX === 'number' && typeof s.panelY === 'number') {
                    placePanel(s.panelX, s.panelY);
                }
                if (s.collapsed) setCollapsed(true);
                if (typeof s.highlightColor === 'string') {
                    colorInput.value = s.highlightColor;
                    refreshHighlights();
                }
                if (typeof s.folderPanelX === 'number' && typeof s.folderPanelY === 'number') {
                    placeFolders(s.folderPanelX, s.folderPanelY);
                }
                if (s.folderCollapsed) setFoldersCollapsed(true);
                if (els.grid.checked) aladin.showCooGrid();
                if (els.constellations.checked) ensureConstellations();
                if (els.tonight.checked && SETTINGS.lat === null) els.tonight.checked = false;
                if (els.tonight.checked) ensureTonightOutline();
                if (s.panelPos) Object.assign(panelPos, s.panelPos);
                if (Array.isArray(s.openPanels)) {
                    openPanels.clear();
                    s.openPanels.forEach(n => { if (PANELS[n] && n !== 'plan') openPanels.add(n); });
                }
                if (typeof s.planMode === 'boolean') {
                    planMode = s.planMode;
                    planBtn.classList.toggle('active', planMode);
                }
                if (s.catColors) Object.assign(catColors, s.catColors);
                if (s.catShow) Object.assign(catShow, s.catShow);
                if (s.catTodo) Object.assign(catTodo, s.catTodo);
                if (s.catTab && CAT_LABEL[s.catTab]) catTab = s.catTab;
                if (s.catScoreMin >= 1 && s.catScoreMin <= 5) catScoreMin = s.catScoreMin;
                if (s.framingFocal) document.getElementById('fr-focal').value = s.framingFocal;
                if (s.framingSwMm)  document.getElementById('fr-sw').value  = s.framingSwMm;
                if (s.framingShMm)  document.getElementById('fr-sh').value  = s.framingShMm;
                if (s.framingRot !== undefined) document.getElementById('fr-rot').value = s.framingRot;
                if (s.framingColor) document.getElementById('fr-color').value = s.framingColor;
                if (s.framingActive) document.getElementById('fr-active').checked = true;
                updateFramingRect();
            }

            restoreState();
            applyPanels();
            if (openPanels.has('stats')) renderStats();
            if (openPanels.has('catalog')) ensureCatalog();
            for (const n of openPanels) if (DEFAULT_POS[n]) placeGeneric(n);
            rebuild();
            updateLabelVisibility();
            console.log("✅ Sky map ready: " + DATA.clusters.length + " clusters");
        }).catch(err => console.error("Aladin error:", err));
    </script>
</body>
